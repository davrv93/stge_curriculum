services:
  nginx:
    image: nginx:1.27-alpine
    container_name: upeu_silabo_ai_nginx
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-38768}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - upeu_silabo_ai
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: upeu_silabo_ai_backend
    depends_on:
      - data-engine
      - ollama
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_SECRET: ${APP_SECRET:-change-me-upeu-silabo-ai-2026}
      SESSION_NAME: ${SESSION_NAME:-UPEU_SILABO_AI_SESSION}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-qwen2.5-coder:3b}
      DATA_ENGINE_BASE_URL: ${DATA_ENGINE_BASE_URL:-http://data-engine:8090}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-2048}
      SHARED_CSV_DIR: ${SHARED_CSV_DIR:-/data/syllabi}
      DEFAULT_CSV_PATH: ${DEFAULT_CSV_PATH:-/data/syllabi/silabos.csv}
      DEFAULT_CSV_DELIMITER: ${DEFAULT_CSV_DELIMITER:-,}
      DEFAULT_CSV_CHUNK: ${DEFAULT_CSV_CHUNK:-1000}
    user: root
    volumes:
      - ./backend/storage:/var/www/app/storage
      - ./data:/data
    networks:
      - upeu_silabo_ai
    restart: unless-stopped

  data-engine:
    build:
      context: ./data-engine
    container_name: upeu_silabo_ai_data_engine
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      DUCKDB_PATH: ${DUCKDB_PATH:-/engine_storage/duckdb/silabos.duckdb}
      CHROMA_PATH: ${CHROMA_PATH:-/engine_storage/chroma}
      DUCKDB_TABLE: ${DUCKDB_TABLE:-silabos}
      MAX_QUERY_LIMIT: ${MAX_QUERY_LIMIT:-500}
      MAX_CHART_ROWS: ${MAX_CHART_ROWS:-5000}
      JOBS_PATH: ${JOBS_PATH:-/engine_storage/jobs}
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ./data:/data
      - ./data/duckdb:/engine_storage/duckdb
      - ./data/chroma:/engine_storage/chroma
      - ./data/jobs:/engine_storage/jobs
    networks:
      - upeu_silabo_ai
    restart: unless-stopped
    shm_size: "512mb"

  ollama:
    image: ollama/ollama:latest
    container_name: upeu_silabo_ai_ollama
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - upeu_silabo_ai
    restart: unless-stopped
    # Para GPU NVIDIA en Linux, descomenta si tienes nvidia-container-toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  upeu_silabo_ai:
    driver: bridge

volumes:
  ollama_models:
