server {

    # CHAT LATERAL V2 PROXY START
    location ^~ /api/chat-lateral/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        chunked_transfer_encoding off;

        add_header X-Accel-Buffering no always;

        proxy_pass http://data-engine:8090/chat-lateral/;
    }
    # CHAT LATERAL V2 PROXY END

    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets must return the real file or 404.
    # This prevents the SPA fallback from serving index.html as JavaScript/CSS,
    # which causes: Unexpected token '<' at app.js:1.
    location ~* \.(?:js|css|ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|map)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Cookie $http_cookie;
        proxy_pass_header  Set-Cookie;
        proxy_read_timeout 180s;
        proxy_send_timeout 60s;
        client_max_body_size 2048m;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
