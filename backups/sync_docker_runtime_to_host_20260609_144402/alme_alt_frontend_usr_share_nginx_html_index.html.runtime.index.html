  <!-- Loading indicator removed by Angular bootstrap -->
  <div class="app-loading" id="app-loading"></div>

  <!-- Angular app root -->
  <app-root></app-root>

  <!-- Performance monitoring - logs Core Web Vitals to console -->
  <script>
    // Measure First Contentful Paint
    if ('PerformanceObserver' in window) {
      const observer = new PerformanceObserver((list) => {
        for (const entry of list.getEntries()) {
          console.log('[Performance]', entry.name, ':', entry.startTime.toFixed(2), 'ms');
        }
      });
      observer.observe({ entryTypes: ['paint', 'largest-contentful-paint', 'first-input'] });
    }

    // Log page load metrics
    window.addEventListener('load', () => {
      setTimeout(() => {
        const perfData = performance.timing;
        const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
        const connectTime = perfData.responseEnd - perfData.requestStart;
        const renderTime = perfData.domComplete - perfData.domLoading;
        console.log('[Performance] Page Load:', pageLoadTime, 'ms');
        console.log('[Performance] Connect:', connectTime, 'ms');
        console.log('[Performance] Render:', renderTime, 'ms');
      }, 0);
    });
  </script>
